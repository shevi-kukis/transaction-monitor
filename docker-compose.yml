version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=financial_monitor_db
    volumes:
      - postgres-data:/var/lib/postgresql/data 
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network

  api:
    build:
      context: ./FinancialMonitor/FinancialMonitor
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__DefaultConnection=Host=db;Database=financial_monitor_db;Username=postgres;Password=${DB_PASSWORD}
    depends_on:
      - db 
      - redis
    restart: unless-stopped
    networks:
      - app-network

  client:
    build:
      context: ./financial-monitor-client
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: 